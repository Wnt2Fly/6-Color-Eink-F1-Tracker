[env:photopainter]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
; Set your serial port (Windows: COM3, macOS/Linux: /dev/ttyUSB0) or omit for auto-detect
; upload_port = COM5
; monitor_port = COM5
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
upload_protocol = esptool
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
build_flags = 
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    ; Unreachable AXP2101 (wrong board / flaky I²C): uncomment to boot without PMIC — battery % off, may not power rails on real PhotoPainter!
    ; -DF1_PMIC_SKIP_ON_FAIL=1
    ; Quiet Arduino log_e/log_w from libraries (e.g. NetworkClient setsockopt after HTTP teardown)
    -DCORE_DEBUG_LEVEL=0
    -DCONFIG_ARDUHAL_LOG_COLORS=0
    -Wno-deprecated-declarations
    -DCONFIG_GDMA_ISR_IRAM_SAFE=0
    -DCONFIG_I2S_ISR_IRAM_SAFE=0
board_build.cmake_extra_args = -DCONFIG_I2S_ISR_IRAM_SAFE=0 -DCONFIG_GDMA_ISR_IRAM_SAFE=0
lib_deps =
    lewisxhe/XPowersLib@^0.2.7
    adafruit/Adafruit GFX Library@^1.11.0
    olikraus/U8g2_for_Adafruit_GFX@^1.8.0
    bblanchon/ArduinoJson@6.21.5
    tzapu/WiFiManager@^2.0.17
build_src_filter = +<*> -<EPD_7in3e.cpp>